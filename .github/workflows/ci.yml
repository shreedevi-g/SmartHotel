name: CI Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # 🟢 Java Build (Spring Boot)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Build Spring Boot
      run: |
        cd HotelBackend
        ./mvnw clean install

    # 🔵 Angular Build
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Angular dependencies
      run: |
        cd HotelManagement
        npm install

    - name: Build Angular
      run: |
        cd HotelManagement
        npm run build --prod
