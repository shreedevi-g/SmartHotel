name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 📥 Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # ☕ Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 🔨 Build Spring Boot
    - name: Build Spring Boot
      run: |
        cd HotelBackend
        chmod +x mvnw
        ./mvnw clean install

    # 🟢 Setup Node
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 📦 Install Angular dependencies
    - name: Install Angular dependencies
      run: |
        cd HotelManagement
        npm install

    # 🏗️ Build Angular
    - name: Build Angular
      run: |
        cd HotelManagement
        npm run build --prod
