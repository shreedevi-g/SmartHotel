name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 📥 Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # ☕ Setup Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 🔨 Build Spring Boot
    - name: Build Spring Boot
      run: |
        cd HotelBackend
        chmod +x mvnw
        ./mvnw clean package

    # 🟢 Setup Node.js (Angular needs Node 20)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 📦 Install Angular dependencies
    - name: Install Angular dependencies
      run: |
        cd HotelManagement
        npm install

    # 🏗️ Build Angular
    - name: Build Angular
      run: |
        cd HotelManagement
        npm run build

    # 🚀 Deploy to EC2 (Spring Boot)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/ec2-user/SmartHotel/HotelBackend
          chmod +x mvnw
          ./mvnw clean package
          pkill -f HotelBackend || true
          nohup java -jar target/*.jar > app.log 2>&1 &
